<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PPRR - Registro App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF y AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .step-content {
            flex: 1;
            padding: 1.5rem;
            padding-bottom: 120px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 1rem 1.5rem calc(1rem + var(--safe-area-inset-bottom));
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            touch-action: none;
        }
        canvas { touch-action: none; width: 100%; height: 100%; border-radius: 12px; }
        .input-group label { font-weight: 600; font-size: 0.85rem; color: #475569; margin-bottom: 0.25rem; display: block; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: white;
            appearance: none;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background: #1e3a8a;
            color: white;
            font-weight: 700;
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            display: block;
            transition: transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); background: #172554; }
        .required::after { content: " *"; color: #ef4444; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER APP -->
        <header class="bg-white px-6 py-4 flex items-center justify-between border-b sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img id="logo-empresa" src="https://res.cloudinary.com/dway4iqeh/image/upload/v1769518146/logosecuritas_kixenx.png" alt="Logo" class="h-10 w-auto rounded border" crossorigin="anonymous">
                <div>
                    <h1 class="text-sm font-black text-blue-900 leading-tight">CAPACITACIÓN</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Securitas / Planta Huachipato</p>
                </div>
            </div>
            <div class="text-[10px] text-right text-gray-400">
                <br>v2.0 Mobile
            </div>
        </header>

        <!-- PROGRESS BAR -->
        <div class="bg-gray-200 h-1 w-full">
            <div id="progress-bar" class="bg-blue-600 h-1 transition-all duration-500" style="width: 33%"></div>
        </div>

        <main class="step-content">
            <!-- PASO 1: SESIÓN -->
            <div id="step-1" class="step-pane">
                <div class="flex items-center gap-2 mb-6">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                    <h2 class="text-xl font-extrabold text-gray-800">Datos de Sesión</h2>
                </div>

                <div class="card space-y-4">
                    <div class="input-group">
                        <label class="required">Tema de Capacitación</label>
                        <input type="text" id="ses-tema" placeholder="Ej: Uso de EPP en fundición">
                    </div>
                    <div class="input-group">
                        <label class="required">Contenido General</label>
                        <textarea id="ses-contenido" rows="2" placeholder="Describa los puntos clave..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group"><label class="required">Fecha</label><input type="date" id="ses-fecha"></div>
                        <div class="input-group"><label class="required">Hora</label><input type="time" id="ses-hora"></div>
                    </div>
                </div>

                <div class="card space-y-4">
                    <h3 class="text-sm font-bold text-blue-800 uppercase tracking-widest border-b pb-2">Identificación Relator</h3>
                    <div class="input-group"><label class="required">Nombre Relator</label><input type="text" id="rel-nombre"></div>
                    <div class="input-group"><label class="required">RUT</label><input type="text" id="rel-rut" placeholder="12.345.678-k"></div>
                    <div class="input-group"><label class="required">Unidad / Cargo</label><input type="text" id="rel-unidad" placeholder="Planta Talcahuano"></div>
                    <!-- Campos ocultos para completar el PDF posterior -->
                    <input type="hidden" id="rel-profesion" value="Especialista Seguridad">
                    <input type="hidden" id="ses-lugar" value="Instalaciones Huachipato">
                    <input type="hidden" id="ses-duracion" value="60 min">
                    <input type="hidden" id="ses-objetivo" value="Cumplimiento normativa seguridad industrial">
                </div>
            </div>

            <!-- PASO 2: PARTICIPANTES -->
            <div id="step-2" class="step-pane hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                        <h2 class="text-xl font-extrabold text-gray-800">Participantes</h2>
                    </div>
                    <span id="p-counter" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">0 / 10</span>
                </div>

                <div id="p-list" class="space-y-4">
                    <!-- Cards de participantes se inyectan aquí -->
                </div>

                <button id="btn-add-p" class="w-full py-4 border-2 border-dashed border-blue-300 rounded-2xl text-blue-600 font-bold flex items-center justify-center gap-2 mt-4 active:bg-blue-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                    Añadir Participante
                </button>
            </div>

            <!-- PASO 3: ÉXITO -->
            <div id="step-3" class="step-pane hidden text-center pt-10">
                <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2 class="text-2xl font-black text-gray-800 mb-2">¡Todo listo!</h2>
                <p class="text-gray-500 mb-8 px-6">El registro ha sido procesado y el PDF se ha descargado en tu dispositivo.</p>
                <button onclick="location.reload()" class="btn-primary">Nueva Capacitación</button>
            </div>
        </main>

        <!-- NAVEGACIÓN INFERIOR (BOTÓN ACCIÓN) -->
        <div class="bottom-nav" id="nav-container">
            <button id="btn-next" class="btn-primary">Continuar</button>
            <button id="btn-back" class="w-full text-gray-400 font-bold text-sm mt-3 hidden">Volver atrás</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let participantCount = 0;
        const signaturePads = {};

        // CLASE DE FIRMA OPTIMIZADA
        class SignaturePad {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.drawing = false;
                this.hasContent = false;
                this.init();
            }
            init() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.ctx.lineWidth = 2.5;
                this.ctx.strokeStyle = "#000";
                this.ctx.lineCap = "round";

                const start = (e) => { this.drawing = true; this.hasContent = true; this.ctx.beginPath(); this.move(e); };
                const move = (e) => { if(!this.drawing) return; this.move(e); this.ctx.stroke(); };
                const end = () => { this.drawing = false; };

                this.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); }, {passive:false});
                this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); }, {passive:false});
                this.canvas.addEventListener('touchend', end);
                this.canvas.addEventListener('mousedown', start);
                this.canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', end);
            }
            move(e) {
                const r = this.canvas.getBoundingClientRect();
                this.ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
            }
            clear() { this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height); this.hasContent = false; }
            getData() { return this.hasContent ? this.canvas.toDataURL() : null; }
        }

        // FLUJO DE NAVEGACIÓN
        const btnNext = document.getElementById('btn-next');
        const btnBack = document.getElementById('btn-back');
        const progressBar = document.getElementById('progress-bar');

        btnNext.addEventListener('click', () => {
            if (currentStep === 1) {
                if(!validateStep1()) return;
                showStep(2);
            } else if (currentStep === 2) {
                if(!validateStep2()) return;
                generateFinalPDF();
                showStep(3);
            }
        });

        btnBack.addEventListener('click', () => {
            if (currentStep === 2) showStep(1);
        });

        function showStep(step) {
            document.querySelectorAll('.step-pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(`step-${step}`).classList.remove('hidden');
            currentStep = step;
            
            if(step === 1) {
                progressBar.style.width = '33%';
                btnNext.innerText = 'Continuar';
                btnBack.classList.add('hidden');
            } else if(step === 2) {
                progressBar.style.width = '66%';
                btnNext.innerText = 'Finalizar y Generar PDF';
                btnBack.classList.remove('hidden');
                if(participantCount === 0) addParticipant();
            } else {
                progressBar.style.width = '100%';
                document.getElementById('nav-container').classList.add('hidden');
            }
            window.scrollTo(0,0);
        }

        function validateStep1() {
            const fields = ['ses-tema', 'ses-contenido', 'ses-fecha', 'ses-hora', 'rel-nombre', 'rel-rut'];
            for(let f of fields) {
                if(!document.getElementById(f).value) {
                    alert("Por favor completa todos los campos del Relator y Sesión.");
                    return false;
                }
            }
            return true;
        }

        function addParticipant() {
            if(participantCount >= 10) return;
            participantCount++;
            const id = participantCount;
            const div = document.createElement('div');
            div.className = "card space-y-4 border-l-4 border-blue-500 relative";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-black text-blue-900 uppercase">Participante #${id}</span>
                </div>
                <div class="input-group"><label class="required">Nombre y Apellidos</label><input type="text" id="p-nombre-${id}" class="p-field"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group"><label class="required">RUT</label><input type="text" id="p-rut-${id}" class="p-field"></div>
                    <div class="input-group">
                        <label class="required">Perfil</label>
                        <select id="p-perfil-${id}" class="p-field">
                            <option value="Guardia">Guardia</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Guardia Táctico">Guardia Táctico</option>
                            <option value="Operaciones">Operaciones</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label class="required">Cargo</label><input type="text" id="p-cargo-${id}" class="p-field"></div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Firma en el recuadro</label>
                    <div class="canvas-container"><canvas id="canvas-${id}"></canvas></div>
                    <button type="button" onclick="signaturePads[${id}].clear()" class="text-[10px] text-red-500 font-bold uppercase tracking-tighter">Limpiar firma</button>
                </div>
            `;
            document.getElementById('p-list').appendChild(div);
            signaturePads[id] = new SignaturePad(`canvas-${id}`);
            document.getElementById('p-counter').innerText = `${participantCount} / 10`;
            
            // Scroll al nuevo participante
            div.scrollIntoView({behavior: 'smooth'});
        }

        document.getElementById('btn-add-p').addEventListener('click', addParticipant);

        function validateStep2() {
            if(participantCount === 0) { alert("Agrega al menos un participante."); return false; }
            for(let i=1; i<=participantCount; i++) {
                if(!document.getElementById(`p-nombre-${i}`).value || !signaturePads[i].hasContent) {
                    alert(`El participante #${i} está incompleto o le falta la firma.`);
                    return false;
                }
            }
            return true;
        }

        // GENERACIÓN PDF IGUAL A VERSIÓN ANTERIOR PERO CON DATOS DE APP
        function generateFinalPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.width;
            
            // Encabezado
            doc.setFillColor(30, 58, 138);
            doc.rect(0, 0, pageWidth, 25, 'F');
            try {
                const logo = document.getElementById('logo-empresa');
                doc.addImage(logo, 'JPEG', 15, 4, 16, 16);
            } catch(e) {}
            
            doc.setTextColor(255);
            doc.setFontSize(14);
            doc.text("COMPAÑÍA SIDERÚRGICA HUACHIPATO S.A.", 35, 12);
            doc.setFontSize(8);
            doc.text("RUT: 94.637.000-2 | Avda. Gran Bretaña N° 2910, Talcahuano", 35, 18);

            doc.setTextColor(0);
            doc.setFontSize(16);
            doc.text("REGISTRO DE ASISTENCIA A CAPACITACIÓN", pageWidth/2, 40, {align:'center'});

            // Datos Sesión
            const sesData = [
                ['Relator:', document.getElementById('rel-nombre').value, 'Fecha:', document.getElementById('ses-fecha').value],
                ['RUT:', document.getElementById('rel-rut').value, 'Hora:', document.getElementById('ses-hora').value],
                ['Tema:', {content: document.getElementById('ses-tema').value, colSpan: 3}],
                ['Contenido:', {content: document.getElementById('ses-contenido').value, colSpan: 3}]
            ];

            doc.autoTable({
                startY: 50,
                body: sesData,
                theme: 'plain',
                styles: { fontSize: 9 }
            });

            // Participantes
            const pRows = [];
            const pSignatures = [];
            for(let i=1; i<=participantCount; i++) {
                pRows.push([
                    i, 
                    document.getElementById(`p-nombre-${i}`).value,
                    document.getElementById(`p-rut-${i}`).value,
                    document.getElementById(`p-cargo-${i}`).value,
                    document.getElementById(`p-perfil-${i}`).value,
                    ""
                ]);
                pSignatures.push(signaturePads[i].getData());
            }

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [["N°", "Nombre", "RUT", "Cargo", "Perfil", "Firma"]],
                body: pRows,
                theme: 'grid',
                headStyles: { fillColor: [30, 58, 138] },
                styles: { fontSize: 8, valign: 'middle', minCellHeight: 15 },
                didDrawCell: function(data) {
                    if (data.column.index === 5 && data.cell.section === 'body') {
                        const img = pSignatures[data.row.index];
                        if(img) doc.addImage(img, 'PNG', data.cell.x + 2, data.cell.y + 2, data.cell.width - 4, data.cell.height - 4);
                    }
                }
            });

            doc.save(`Huachipato_Registro_${Date.now()}.pdf`);
        }
    </script>
</body>
</html>
